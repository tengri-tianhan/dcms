services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dcms
      POSTGRES_PASSWORD: dcms_pw
      POSTGRES_DB: dcms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrate.sql:/docker-entrypoint-initdb.d/01-migrate.sql:ro
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcms"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
