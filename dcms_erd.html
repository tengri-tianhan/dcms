<style>
#erd { padding: 1rem 0; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const src = `erDiagram
  PROJECTS ||--o{ DOCUMENTS : contains
  PROJECTS ||--o{ DISTRIBUTION_MATRIX : defines
  DOCUMENTS ||--o{ DOCUMENT_VERSIONS : has
  DOCUMENT_VERSIONS ||--o| WORKFLOW_INSTANCES : tracked_by
  DOCUMENT_VERSIONS ||--o{ TRANSMITTAL_ITEMS : included_in
  WORKFLOW_INSTANCES ||--o{ WORKFLOW_STEPS : has
  TRANSMITTALS ||--o{ TRANSMITTAL_ITEMS : bundles
  TRANSMITTALS ||--o{ TRANSMITTAL_RECIPIENTS : sent_to
  USERS ||--o{ TRANSMITTALS : sends
  USERS ||--o{ TRANSMITTAL_RECIPIENTS : receives
  USERS ||--o{ AUDIT_LOGS : performs
  PROJECTS {
    uuid id PK
    string code
    string name
    string status
    timestamp created_at
  }
  DOCUMENTS {
    uuid id PK
    uuid project_id FK
    string doc_code
    string title
    string doc_type
    string discipline
  }
  DOCUMENT_VERSIONS {
    uuid id PK
    uuid document_id FK
    string revision
    string file_key
    string status
    uuid created_by FK
    timestamp created_at
  }
  TRANSMITTALS {
    uuid id PK
    uuid project_id FK
    string transmittal_no
    uuid sender_id FK
    string status
    timestamp sent_at
  }
  TRANSMITTAL_ITEMS {
    uuid id PK
    uuid transmittal_id FK
    uuid document_version_id FK
    string purpose
  }
  TRANSMITTAL_RECIPIENTS {
    uuid id PK
    uuid transmittal_id FK
    uuid user_id FK
    timestamp acknowledged_at
  }
  WORKFLOW_INSTANCES {
    uuid id PK
    uuid document_version_id FK
    string current_step
    string status
  }
  WORKFLOW_STEPS {
    uuid id PK
    uuid instance_id FK
    string step_name
    uuid assignee_id FK
    string action
    timestamp completed_at
  }
  USERS {
    uuid id PK
    string email
    string name
    string role
  }
  DISTRIBUTION_MATRIX {
    uuid id PK
    uuid project_id FK
    string document_type
    string discipline
    string recipient_role
  }
  AUDIT_LOGS {
    uuid id PK
    uuid user_id FK
    string action
    string entity_type
    uuid entity_id
    timestamp at
  }`;
const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
